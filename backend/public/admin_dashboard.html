<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --danger: #F44336;
            --warning: #FF9800;
            --success: #4CAF50;
            --info: #2196F3;
            --dark: #212121;
            --light: #F5F5F5;
            --white: #FFFFFF;
            --border: #E0E0E0;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: var(--white);
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px var(--shadow);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease;
        }

        .header h1 {
            color: var(--primary);
            font-size: 28px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: fadeIn 0.5s ease;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
        }

        .tabs {
            background: var(--white);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--white);
        }

        .tab-content {
            display: none;
            background: var(--white);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--light);
            font-weight: 600;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
        }

        .btn-success {
            background: var(--success);
            color: var(--white);
        }

        .btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--dark);
            color: var(--white);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎯 لوحة تحكم SQUAD</h1>
            <div>
                <span>مرحباً، المشرف</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>👥 إجمالي المستخدمين</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>⏳ في انتظار الموافقة</h3>
                <div class="value" id="pendingApprovals">0</div>
            </div>
            <div class="stat-card">
                <h3>📝 إجمالي المنشورات</h3>
                <div class="value" id="totalPosts">0</div>
            </div>
            <div class="stat-card">
                <h3>💬 إجمالي المحادثات</h3>
                <div class="value" id="totalChats">0</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('users')">👥 المستخدمون</button>
            <button class="tab-btn" onclick="switchTab('approvals')">⏳ الموافقات</button>
            <button class="tab-btn" onclick="switchTab('posts')">📝 المنشورات</button>
            <button class="tab-btn" onclick="switchTab('chats')">💬 المحادثات</button>
        </div>

        <!-- Users Tab -->
        <div id="users-tab" class="tab-content active">
            <h2 style="margin-bottom: 20px;">إدارة المستخدمين</h2>
            <div id="usersTable"></div>
        </div>

        <!-- Approvals Tab -->
        <div id="approvals-tab" class="tab-content">
            <h2 style="margin-bottom: 20px;">الموافقات المعلقة</h2>
            <div id="approvalsTable"></div>
        </div>

        <!-- Posts Tab -->
        <div id="posts-tab" class="tab-content">
            <h2 style="margin-bottom: 20px;">إدارة المنشورات</h2>
            <div id="postsTable"></div>
        </div>

        <!-- Chats Tab -->
        <div id="chats-tab" class="tab-content">
            <h2 style="margin-bottom: 20px;">إدارة المحادثات</h2>
            <div id="chatsTable"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://13.250.156.248:3000/api/admin/dashboard';

        // Switch tabs
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            // Load data for tab
            if (tabName === 'users') loadUsers();
            if (tabName === 'approvals') loadApprovals();
            if (tabName === 'posts') loadPosts();
            if (tabName === 'chats') loadChats();
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Load dashboard stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.stats.totalUsers;
                    document.getElementById('pendingApprovals').textContent = data.stats.pendingApprovals;
                    document.getElementById('totalPosts').textContent = data.stats.totalPosts;
                    document.getElementById('totalChats').textContent = data.stats.totalChats;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/users`);
                const data = await response.json();

                if (data.success && data.users.length > 0) {
                    const html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>البريد</th>
                                    <th>النوع</th>
                                    <th>الحالة</th>
                                    <th>إجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.users.map(user => `
                                    <tr>
                                        <td>${user.name}</td>
                                        <td>${user.email}</td>
                                        <td>${user.type}</td>
                                        <td>${user.status}</td>
                                        <td>
                                            <button class="btn btn-danger" onclick="deleteUser(${user.id})">حذف</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    document.getElementById('usersTable').innerHTML = html;
                } else {
                    document.getElementById('usersTable').innerHTML = '<div class="empty-state">لا يوجد مستخدمون</div>';
                }
            } catch (error) {
                console.error('Error loading users:', error);
                showToast('خطأ في تحميل المستخدمين', 'error');
            }
        }

        // Load approvals
        async function loadApprovals() {
            try {
                const response = await fetch(`${API_URL}/approvals`);
                const data = await response.json();

                if (data.success && data.approvals.length > 0) {
                    const html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>البريد</th>
                                    <th>النوع</th>
                                    <th>إجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.approvals.map(user => `
                                    <tr>
                                        <td>${user.name}</td>
                                        <td>${user.email}</td>
                                        <td>${user.type}</td>
                                        <td>
                                            <button class="btn btn-success" onclick="approveUser(${user.id})">موافقة</button>
                                            <button class="btn btn-danger" onclick="rejectUser(${user.id})">رفض</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    document.getElementById('approvalsTable').innerHTML = html;
                } else {
                    document.getElementById('approvalsTable').innerHTML = '<div class="empty-state">لا توجد موافقات معلقة</div>';
                }
            } catch (error) {
                console.error('Error loading approvals:', error);
                showToast('خطأ في تحميل الموافقات', 'error');
            }
        }

        // Load posts
        async function loadPosts() {
            try {
                const response = await fetch(`${API_URL}/posts`);
                const data = await response.json();

                if (data.success && data.posts.length > 0) {
                    const html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>المحتوى</th>
                                    <th>الناشر</th>
                                    <th>التاريخ</th>
                                    <th>إجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.posts.map(post => `
                                    <tr>
                                        <td>${post.content.substring(0, 50)}...</td>
                                        <td>${post.user_name}</td>
                                        <td>${new Date(post.created_at).toLocaleDateString('ar')}</td>
                                        <td>
                                            <button class="btn btn-danger" onclick="deletePost(${post.id})">حذف</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    document.getElementById('postsTable').innerHTML = html;
                } else {
                    document.getElementById('postsTable').innerHTML = '<div class="empty-state">لا توجد منشورات</div>';
                }
            } catch (error) {
                console.error('Error loading posts:', error);
                showToast('خطأ في تحميل المنشورات', 'error');
            }
        }

        // Load chats
        async function loadChats() {
            try {
                const response = await fetch(`${API_URL}/chats`);
                const data = await response.json();

                if (data.success && data.chats.length > 0) {
                    const html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>المستخدم 1</th>
                                    <th>المستخدم 2</th>
                                    <th>التاريخ</th>
                                    <th>إجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.chats.map(chat => `
                                    <tr>
                                        <td>${chat.user1_name}</td>
                                        <td>${chat.user2_name}</td>
                                        <td>${new Date(chat.created_at).toLocaleDateString('ar')}</td>
                                        <td>
                                            <button class="btn btn-danger" onclick="deleteChat(${chat.id})">حذف</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    document.getElementById('chatsTable').innerHTML = html;
                } else {
                    document.getElementById('chatsTable').innerHTML = '<div class="empty-state">لا توجد محادثات</div>';
                }
            } catch (error) {
                console.error('Error loading chats:', error);
                showToast('خطأ في تحميل المحادثات', 'error');
            }
        }

        // Delete user
        async function deleteUser(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المستخدم؟')) return;

            try {
                const response = await fetch(`${API_URL}/users/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    showToast('تم حذف المستخدم بنجاح', 'success');
                    loadUsers();
                    loadStats();
                }
            } catch (error) {
                console.error('Error deleting user:', error);
                showToast('خطأ في حذف المستخدم', 'error');
            }
        }

        // Approve user
        async function approveUser(id) {
            try {
                const response = await fetch(`${API_URL}/approvals/${id}/approve`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    showToast('تمت الموافقة على المستخدم', 'success');
                    loadApprovals();
                    loadStats();
                }
            } catch (error) {
                console.error('Error approving user:', error);
                showToast('خطأ في الموافقة', 'error');
            }
        }

        // Reject user
        async function rejectUser(id) {
            try {
                const response = await fetch(`${API_URL}/approvals/${id}/reject`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    showToast('تم رفض المستخدم', 'success');
                    loadApprovals();
                    loadStats();
                }
            } catch (error) {
                console.error('Error rejecting user:', error);
                showToast('خطأ في الرفض', 'error');
            }
        }

        // Delete post
        async function deletePost(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنشور؟')) return;

            try {
                const response = await fetch(`${API_URL}/posts/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    showToast('تم حذف المنشور بنجاح', 'success');
                    loadPosts();
                    loadStats();
                }
            } catch (error) {
                console.error('Error deleting post:', error);
                showToast('خطأ في حذف المنشور', 'error');
            }
        }

        // Delete chat
        async function deleteChat(id) {
            if (!confirm('هل أنت متأكد من حذف هذه المحادثة؟')) return;

            try {
                const response = await fetch(`${API_URL}/chats/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    showToast('تم حذف المحادثة بنجاح', 'success');
                    loadChats();
                    loadStats();
                }
            } catch (error) {
                console.error('Error deleting chat:', error);
                showToast('خطأ في حذف المحادثة', 'error');
            }
        }

        // Initialize
        loadStats();
        loadUsers();
    </script>
</body>
</html>
